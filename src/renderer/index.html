<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Prompt Enhancer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
    <!-- Title Bar -->
    <div class="title-bar" id="titleBar">
      <div class="title-bar-drag">
        <span class="title">Prompt Enhancer</span>
      </div>
      <div class="title-bar-buttons">
        <button class="title-btn minimize" id="minimizeBtn" title="Minimize to tray">
          <svg width="12" height="12" viewBox="0 0 12 12">
            <rect x="2" y="5.5" width="8" height="1" rx="0.5" fill="currentColor" />
          </svg>
        </button>
        <button class="title-btn close" id="closeBtn" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12">
            <path d="M2.5 2.5L9.5 9.5M9.5 2.5L2.5 9.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- API Key Section -->
      <div class="section">
        <div class="section-header">
          <h2>API Configuration</h2>
        </div>
        <div class="field">
          <label for="apiKey">Gemini API Key</label>
          <div class="input-group">
            <input type="password" id="apiKey" placeholder="Enter your Gemini API key" autocomplete="off">
            <button class="icon-btn" id="toggleApiKey" title="Show/Hide">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Shortcut Section -->
      <div class="section">
        <div class="section-header">
          <h2>Keyboard Shortcuts</h2>
        </div>
        <div class="field">
          <label for="shortcut">Enhance Hotkey</label>
          <div class="input-group">
            <input type="text" id="shortcut" placeholder="Press keys..." readonly>
            <button class="icon-btn" id="recordShortcut" title="Record new shortcut">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" fill="currentColor" />
              </svg>
            </button>
          </div>
          <p class="hint">Enhances text with the default prompt</p>
        </div>
        <div class="field">
          <label for="customShortcut">Custom Instruction Hotkey</label>
          <div class="input-group">
            <input type="text" id="customShortcut" placeholder="Press keys..." readonly>
            <button class="icon-btn" id="recordCustomShortcut" title="Record new shortcut">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" fill="currentColor" />
              </svg>
            </button>
          </div>
          <p class="hint">Opens a dialog for custom instructions (e.g. "make it formal")</p>
        </div>
      </div>

      <!-- Prompt Section -->
      <div class="section">
        <div class="section-header">
          <h2>Enhancement Prompt</h2>
        </div>
        <div class="field">
          <label for="prompt">Custom Prompt</label>
          <textarea id="prompt"
            placeholder="Enter your prompt here. Use {text} as placeholder for the captured text."></textarea>
          <p class="hint">Use <code>{text}</code> to include the captured text in your prompt</p>
        </div>
      </div>

      <!-- Options Section -->
      <div class="section">
        <div class="section-header">
          <h2>Preferences</h2>
        </div>
        <div class="field checkbox-field">
          <label class="checkbox-label" for="enableNotifications">
            <span>Show notifications</span>
            <input type="checkbox" id="enableNotifications">
            <span class="checkbox-custom"></span>
          </label>
        </div>
        <div class="field checkbox-field">
          <label class="checkbox-label" for="startAtLogin">
            <span>Start at Windows</span>
            <input type="checkbox" id="startAtLogin">
            <span class="checkbox-custom"></span>
          </label>
        </div>
      </div>

    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
      <span id="toastMessage"></span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
